<div class="profile-page-wrapper" *ngIf="profile">
  <div class="profile-container">

    <header class="profile-header">
      <div class="avatar-wrapper">
        <img [src]="currentAvatar" class="profile-avatar" alt="Аватар">

        <div *ngIf="isOwner" class="upload-overlay">
          <label for="file-upload" class="custom-file-upload">
            <span>Змінити фото</span>
          </label>
          <input id="file-upload" type="file" (change)="onFileSelected($event)" accept="image/*" style="display: none;">
        </div>
      </div>

      <h2 class="user-name">{{ profile.firstName }} {{ profile.lastName }}</h2>
    </header>

    <div class="profile-actions" *ngIf="!isOwner">

      <button *ngIf="friendshipStatus === 'NONE'"
              (click)="addFriend()"
              class="btn-add-friend">
        Додати в друзі
      </button>

      <button *ngIf="friendshipStatus === 'PENDING'"
              disabled
              class="btn-pending">
        Запит надіслано...
      </button>

      <button *ngIf="friendshipStatus === 'ACCEPTED'"
              class="btn-accepted">
        У друзях ✅
      </button>

    </div>
    <main class="profile-content">
      <div class="posts-section">
        <app-post-list
          *ngIf="profile.id"
          [ownerId]="profile!.id"
          [ownerType]="'PROFILE'"
          [canPost]="isOwner">
        </app-post-list>
      </div>

      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

  <nav-bar></nav-bar>
</div>
