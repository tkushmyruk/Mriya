<div class="login-container">
  <h2>{{ isLoginMode ? 'Вхід у систему' : 'Реєстрація' }}</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div *ngIf="!isLoginMode">
      <div class="form-group">
        <label>Ім'я</label>
        <input type="text" formControlName="firstName" placeholder="Ваше ім'я">
      </div>
      <div class="form-group">
        <label>Прізвище</label>
        <input type="text" formControlName="lastName" placeholder="Ваше прізвище">
      </div>
      <div class="form-group">
        <label>Номер Телефону</label>
        <input type="text" formControlName="phone" placeholder="Введіть номер телефону">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Введіть email">
    </div>


    <div class="form-group">
      <label>Пароль</label>
      <input type="password" formControlName="password" placeholder="Введіть пароль">
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="actions">
      <button type="submit" [disabled]="loginForm.invalid">
        {{ isLoginMode ? 'Увійти' : 'Створити акаунт' }}
      </button>

      <a href="javascript:void(0)" (click)="toggleMode()">
        {{ isLoginMode ? 'Ще немає акаунту? Реєстрація' : 'Вже є акаунт? Увійти' }}
      </a>
    </div>
  </form>
</div>
