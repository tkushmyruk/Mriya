<div class="post-creator">
  <textarea [(ngModel)]="newPostContent" placeholder="Що нового?"></textarea>
  <button (click)="submitPost()" [disabled]="!newPostContent">Опублікувати</button>
</div>

<div class="posts-feed">
  <div *ngFor="let post of posts" class="post-card">

    <div class="post-header">
      <span>Автор: {{ post.authorId }}</span>
      <small>{{ post.createdAt | date:'short' }}</small>
    </div>

    <div class="post-content">
      {{ post.content }}
    </div>

    <div class="post-actions">
      <button class="action-btn" (click)="post.showComments = !post.showComments">
        <span class="icon">💬</span>
        {{ post.showComments ? 'Сховати коментарі' : 'Коментувати' }}
      </button>
    </div>

    <app-post-comments
      *ngIf="post.showComments && post.id"
      [postId]="post.id!">
    </app-post-comments>

    <div class="post-footer">
      <span>❤️ {{ post.likesCount || 0 }}</span>
      <span>💬 {{ post.commentsCount || 0 }}</span>
    </div>

  </div>
</div>
