<div class="search-page">
  <div class="search-header">
    <h1>Пошук людей</h1>
    <div class="input-wrapper">
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (input)="onSearchChange()"
        placeholder="Введіть ім'я або прізвище..."
        autofocus
      >
    </div>
  </div>

  <div class="results-container">
    <div *ngIf="searchResults.length === 0 && searchQuery.length >= 2" class="no-results">
      Нікого не знайдено за запитом "{{ searchQuery }}"
    </div>

    <div *ngFor="let person of searchResults" class="user-card" [routerLink]="['/profile', person.id]">
      <div class="user-info">
        <h3>{{ person.firstName }} {{ person.lastName }}</h3>
        <button class="view-btn">Переглянути профіль</button>
      </div>
    </div>
  </div>
</div>
